<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - TokoKu</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #f5f7fe 0%, #e9eef5 100%); min-height: 100vh; }
        /* Login Box - Tombol login sudah diperkecil */
        .login-container { display: flex; justify-content: center; align-items: center; min-height: 100vh; backdrop-filter: blur(4px); }
        .login-card { background: white; padding: 2rem; border-radius: 40px; box-shadow: 0 25px 45px -12px rgba(0,0,0,0.2); width: 100%; max-width: 360px; text-align: center; }
        .login-card i { font-size: 2.5rem; color: #2563eb; margin-bottom: 0.8rem; }
        .login-card h2 { font-size: 1.5rem; margin-bottom: 1.2rem; }
        .login-card input { width: 100%; padding: 0.75rem 1rem; border-radius: 40px; border: 1px solid #e2e8f0; margin-bottom: 1rem; font-size: 0.9rem; }
        /* TOMBOL LOGIN DIPERKECIL */
        .login-card button { 
            background: #2563eb; 
            color: white; 
            border: none; 
            width: auto; 
            min-width: 140px;
            padding: 0.7rem 1.5rem; 
            border-radius: 40px; 
            font-weight: 600; 
            cursor: pointer; 
            font-size: 0.9rem;
            margin-top: 0.5rem;
            transition: 0.2s;
        }
        .login-card button:hover { background: #1d4ed8; transform: scale(1.02); }
        .error-msg { color: #dc2626; margin-top: 0.5rem; font-size: 0.8rem; }
        /* Admin Panel (sama seperti sebelumnya, tidak diubah) */
        .admin-panel { display: none; }
        .navbar { background: rgba(255,255,255,0.9); backdrop-filter: blur(12px); padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; position: sticky; top:0; z-index:100; }
        .logo { font-size: 1.6rem; font-weight: 700; background: linear-gradient(135deg,#2563eb,#7c3aed); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .logout-btn { background: #ef4444; border: none; padding: 0.5rem 1rem; border-radius: 40px; color: white; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px; font-size: 0.85rem; }
        .container { max-width: 1400px; margin: 2rem auto; padding: 0 1.5rem; }
        .tabs { display: flex; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap; background: rgba(255,255,255,0.6); padding: 0.5rem; border-radius: 60px; justify-content: center; }
        .tab-btn { background: transparent; border: none; padding: 0.7rem 1.5rem; border-radius: 50px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 10px; font-size: 0.9rem; transition: 0.2s; color: #1e293b; }
        .tab-btn.active { background: white; color: #2563eb; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .tab-content { display: none; background: white; border-radius: 32px; padding: 1.5rem; box-shadow: 0 20px 35px -10px rgba(0,0,0,0.08); }
        .tab-content.active { display: block; }
        .form-card { background: #f8fafc; border-radius: 24px; padding: 1.2rem; margin-bottom: 1.5rem; }
        .form-group { margin-bottom: 1rem; }
        label { font-weight: 600; display: block; margin-bottom: 0.4rem; font-size: 0.9rem; }
        input, textarea, select { width: 100%; padding: 0.7rem 1rem; border: 1px solid #e2e8f0; border-radius: 20px; font-size: 0.9rem; }
        .btn-primary { background: #2563eb; color: white; border: none; padding: 0.7rem 1.5rem; border-radius: 40px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; font-size: 0.9rem; }
        .btn-success { background: #10b981; color: white; border: none; padding: 0.5rem 1rem; border-radius: 40px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; font-size: 0.85rem; }
        .btn-chat { background: #3b82f6; color: white; border: none; padding: 0.5rem 1rem; border-radius: 40px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; font-size: 0.85rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px,1fr)); gap: 1.2rem; margin-top: 1rem; }
        .product-card, .banner-card, .order-card { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .product-card img { width: 100%; height: 160px; object-fit: cover; }
        .product-info { padding: 1rem; }
        .chat-area { display: flex; gap: 1rem; flex-wrap: wrap; }
        .rooms-list { flex:1.2; min-width:200px; background:#f8fafc; border-radius:20px; padding:0.5rem; max-height:500px; overflow-y:auto; }
        .chat-window { flex:3; background:#fff; border-radius:20px; display:flex; flex-direction:column; height:500px; }
        .room-item { padding:0.8rem; border-radius:16px; margin-bottom:0.5rem; cursor:pointer; display:flex; align-items:center; gap:8px; font-size:0.9rem; }
        .room-item.active { background:#dbeafe; }
        .messages { flex:1; overflow-y:auto; padding:1rem; display:flex; flex-direction:column; gap:0.6rem; }
        .message { max-width:75%; padding:0.5rem 1rem; border-radius:20px; font-size:0.85rem; }
        .message.admin { background:#2563eb; color:white; align-self:flex-end; }
        .message.buyer { background:#f1f5f9; align-self:flex-start; }
        .chat-input { display:flex; gap:0.5rem; padding:0.8rem; border-top:1px solid #eef2ff; }
        .badge { background:#ef4444; color:white; border-radius:50px; padding:2px 6px; font-size:0.7rem; margin-left:6px; }
        .toast { position:fixed; bottom:20px; right:20px; background:#1e293b; color:white; padding:10px 18px; border-radius:40px; font-size:0.85rem; z-index:1000; }
        @media (max-width:768px) { .container { padding:0 1rem; } .tab-btn { padding:0.5rem 1rem; font-size:0.8rem; } }
    </style>
</head>
<body>
    <div id="adminLoginContainer" class="login-container">
        <div class="login-card">
            <i class="fas fa-user-shield"></i>
            <h2>Login Admin</h2>
            <input type="password" id="adminPassword" placeholder="Password admin" autofocus>
            <button onclick="adminLogin()"><i class="fas fa-key"></i> Login</button>
            <div id="loginError" class="error-msg"></div>
            <p style="margin-top:0.8rem; font-size:0.75rem;">Password: <strong>admin1</strong></p>
        </div>
    </div>

    <div id="adminPanel" class="admin-panel">
        <div class="navbar">
            <div class="logo"><i class="fas fa-store"></i> AdminPanel</div>
            <button class="logout-btn" onclick="adminLogout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </div>
        <div class="container">
            <div class="tabs">
                <button class="tab-btn active" data-tab="products"><i class="fas fa-box"></i> Produk</button>
                <button class="tab-btn" data-tab="banners"><i class="fas fa-images"></i> Banner</button>
                <button class="tab-btn" data-tab="orders"><i class="fas fa-truck"></i> Pesanan</button>
                <button class="tab-btn" data-tab="chat"><i class="fas fa-comment-dots"></i> Chat</button>
            </div>
            <div id="products" class="tab-content active">
                <div class="form-card">
                    <h3>Tambah Produk</h3>
                    <form id="productForm">
                        <div class="form-group"><label>Nama Produk</label><input type="text" id="prodName" required></div>
                        <div class="form-group"><label>Foto</label><input type="file" id="prodImage" accept="image/*" required></div>
                        <div class="form-group"><label>Deskripsi</label><textarea id="prodDesc" rows="2"></textarea></div>
                        <div class="form-group"><label>Jenis</label><input type="text" id="prodType"></div>
                        <div class="form-group"><label>Harga (Rp)</label><input type="number" id="prodPrice"></div>
                        <button type="submit" class="btn-primary"><i class="fas fa-upload"></i> Upload</button>
                    </form>
                </div>
                <h3>Daftar Produk</h3>
                <div id="productList" class="grid"></div>
            </div>
            <div id="banners" class="tab-content">
                <div class="form-card">
                    <h3>Upload Banner (19:6)</h3>
                    <form id="bannerForm">
                        <div class="form-group"><label>Gambar</label><input type="file" id="bannerImage" accept="image/*" required></div>
                        <button type="submit" class="btn-primary"><i class="fas fa-cloud-upload-alt"></i> Upload</button>
                    </form>
                </div>
                <h3>Banner Aktif</h3>
                <div id="bannerList" class="grid"></div>
            </div>
            <div id="orders" class="tab-content">
                <h3>Pesanan Pending</h3>
                <div id="pendingOrders" class="grid"></div>
                <h3 style="margin-top:1.5rem;">Pesanan Selesai</h3>
                <div id="completedOrders" class="grid"></div>
            </div>
            <div id="chat" class="tab-content">
                <h3>Chat dengan Pembeli</h3>
                <div class="chat-area">
                    <div class="rooms-list" id="roomsList">Memuat...</div>
                    <div class="chat-window">
                        <div id="chatMessages" class="messages"></div>
                        <div class="chat-input">
                            <input type="text" id="messageInput" placeholder="Pesan...">
                            <input type="file" id="chatFile" accept="image/*,video/*" style="display:none">
                            <button onclick="document.getElementById('chatFile').click()" class="btn-primary" style="background:#64748b; padding:0.5rem 1rem;"><i class="fas fa-paperclip"></i></button>
                            <button id="sendMsgBtn" class="btn-primary"><i class="fas fa-paper-plane"></i> Kirim</button>
                        </div>
                        <div id="filePreview" style="font-size:11px; padding:0 0.8rem 0.8rem;"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Storage initialization
        if (!localStorage.getItem('products')) localStorage.setItem('products', JSON.stringify([]));
        if (!localStorage.getItem('banners')) localStorage.setItem('banners', JSON.stringify([]));
        if (!localStorage.getItem('orders')) localStorage.setItem('orders', JSON.stringify([]));
        if (!localStorage.getItem('users')) localStorage.setItem('users', JSON.stringify([]));
        if (!localStorage.getItem('chatRooms')) localStorage.setItem('chatRooms', JSON.stringify([]));
        if (!localStorage.getItem('messages')) localStorage.setItem('messages', JSON.stringify([]));

        let currentRoomId = null;

        function showToast(msg, isError = false) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-triangle' : 'fa-bell'}"></i> ${msg}`;
            toast.style.background = isError ? '#dc2626' : '#1e293b';
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function adminLogin() {
            const pwd = document.getElementById('adminPassword').value;
            if (pwd !== 'admin1') {
                document.getElementById('loginError').innerText = 'Password salah!';
                return;
            }
            localStorage.setItem('adminLoggedIn', 'true');
            document.getElementById('adminLoginContainer').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
            initAdminApp();
        }

        function adminLogout() {
            localStorage.removeItem('adminLoggedIn');
            location.reload();
        }

        if (localStorage.getItem('adminLoggedIn') === 'true') {
            document.getElementById('adminLoginContainer').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
            initAdminApp();
        }

        function initAdminApp() {
            loadProducts(); loadBanners(); loadOrders(); loadChatRooms();
            window.addEventListener('storage', (e) => {
                if (e.key === 'orders') loadOrders();
                if (e.key === 'messages' || e.key === 'chatRooms') { loadChatRooms(); if (currentRoomId) loadMessages(currentRoomId); }
                if (e.key === 'products') loadProducts();
                if (e.key === 'banners') loadBanners();
            });

            document.getElementById('productForm').addEventListener('submit', (e) => {
                e.preventDefault();
                const name = document.getElementById('prodName').value;
                const desc = document.getElementById('prodDesc').value;
                const type = document.getElementById('prodType').value;
                const price = parseInt(document.getElementById('prodPrice').value);
                const file = document.getElementById('prodImage').files[0];
                if (!file) return showToast('Pilih foto', true);
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const products = JSON.parse(localStorage.getItem('products'));
                    products.push({ id: Date.now(), name, description: desc, type, price, imageUrl: ev.target.result });
                    localStorage.setItem('products', JSON.stringify(products));
                    showToast('Produk ditambahkan');
                    loadProducts();
                    e.target.reset();
                };
                reader.readAsDataURL(file);
            });

            document.getElementById('bannerForm').addEventListener('submit', (e) => {
                e.preventDefault();
                const file = document.getElementById('bannerImage').files[0];
                if (!file) return showToast('Pilih banner', true);
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const banners = JSON.parse(localStorage.getItem('banners'));
                    banners.push({ id: Date.now(), imageUrl: ev.target.result });
                    localStorage.setItem('banners', JSON.stringify(banners));
                    showToast('Banner terupload');
                    loadBanners();
                    e.target.reset();
                };
                reader.readAsDataURL(file);
            });

            document.getElementById('sendMsgBtn').addEventListener('click', async () => {
                if (!currentRoomId) return showToast('Pilih ruang chat', true);
                const msgInput = document.getElementById('messageInput');
                const text = msgInput.value.trim();
                const fileInput = document.getElementById('chatFile');
                let fileUrl = null;
                if (fileInput.files.length) {
                    const file = fileInput.files[0];
                    fileUrl = await new Promise(resolve => { const r = new FileReader(); r.onload = e => resolve(e.target.result); r.readAsDataURL(file); });
                }
                if (!text && !fileUrl) return;
                const messages = JSON.parse(localStorage.getItem('messages'));
                messages.push({ id: Date.now(), roomId: currentRoomId, senderId: 'admin', senderName: 'Admin', content: text, fileUrl, timestamp: Date.now() });
                localStorage.setItem('messages', JSON.stringify(messages));
                msgInput.value = '';
                fileInput.value = '';
                document.getElementById('filePreview').innerHTML = '';
                loadMessages(currentRoomId);
                window.dispatchEvent(new StorageEvent('storage', { key: 'messages' }));
            });

            document.getElementById('chatFile').addEventListener('change', (e) => {
                const file = e.target.files[0];
                document.getElementById('filePreview').innerHTML = file ? `<i class="fas fa-file"></i> ${file.name}` : '';
            });

            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const tabId = btn.dataset.tab;
                    document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
                    document.getElementById(tabId).classList.add('active');
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    if (tabId === 'chat') { loadChatRooms(); if(currentRoomId) loadMessages(currentRoomId); }
                    if (tabId === 'orders') loadOrders();
                });
            });
        }

        function loadProducts() {
            const products = JSON.parse(localStorage.getItem('products'));
            document.getElementById('productList').innerHTML = products.map(p => `
                <div class="product-card"><img src="${p.imageUrl}"><div class="product-info"><h4>${p.name}</h4><p>${p.description.substring(0,60)}</p><strong>${p.type}</strong> | Rp${p.price.toLocaleString()}</div></div>
            `).join('');
        }

        function loadBanners() {
            const banners = JSON.parse(localStorage.getItem('banners'));
            document.getElementById('bannerList').innerHTML = banners.map(b => `<div class="banner-card"><img src="${b.imageUrl}" style="width:100%; height:120px; object-fit:cover;"></div>`).join('');
        }

        function loadOrders() {
            const orders = JSON.parse(localStorage.getItem('orders'));
            const products = JSON.parse(localStorage.getItem('products'));
            const users = JSON.parse(localStorage.getItem('users'));
            const enriched = orders.map(o => ({ ...o, product: products.find(p => p.id == o.productId), buyer: users.find(u => u.id == o.buyerId) || { name: 'Pembeli', id: o.buyerId } }));
            const pending = enriched.filter(o => o.status === 'pending');
            const completed = enriched.filter(o => o.status === 'completed');
            document.getElementById('pendingOrders').innerHTML = pending.map(order => `
                <div class="order-card" style="padding:1rem;">
                    <p><strong>${order.product?.name}</strong> (x${order.quantity})</p>
                    <p>${order.buyer?.name} - Rp${order.totalPrice.toLocaleString()}</p>
                    <p>Alamat: ${order.address}</p>
                    <div style="display:flex; gap:8px; margin-top:8px;">
                        <button class="btn-success" onclick="completeOrder('${order.id}')"><i class="fas fa-check"></i> Selesai</button>
                        <button class="btn-chat" onclick="startChatWithBuyer('${order.buyerId}', '${order.buyer?.name}')"><i class="fas fa-comment"></i> Chat</button>
                    </div>
                </div>
            `).join('');
            document.getElementById('completedOrders').innerHTML = completed.map(order => `<div class="order-card" style="padding:1rem; background:#f0fdf4;"><i class="fas fa-check-circle"></i> Pesanan #${order.id} - ${order.product?.name} Selesai</div>`).join('');
        }

        window.completeOrder = function(orderId) {
            let orders = JSON.parse(localStorage.getItem('orders'));
            orders = orders.map(o => o.id == orderId ? { ...o, status: 'completed' } : o);
            localStorage.setItem('orders', JSON.stringify(orders));
            showToast('Pesanan selesai');
            loadOrders();
        };

        window.startChatWithBuyer = function(buyerId, buyerName) {
            let chatRooms = JSON.parse(localStorage.getItem('chatRooms'));
            let room = chatRooms.find(r => r.buyerId == buyerId && r.adminId === 'admin');
            if (!room) {
                room = { id: Date.now(), buyerId, adminId: 'admin', buyerName, createdAt: Date.now() };
                chatRooms.push(room);
                localStorage.setItem('chatRooms', JSON.stringify(chatRooms));
            }
            currentRoomId = room.id;
            loadChatRooms();
            loadMessages(currentRoomId);
            document.querySelector('[data-tab="chat"]').click();
            setTimeout(() => { const active = document.querySelector(`.room-item[data-roomid="${currentRoomId}"]`); if(active) active.classList.add('active'); }, 200);
        };

        function loadChatRooms() {
            const rooms = JSON.parse(localStorage.getItem('chatRooms'));
            const messages = JSON.parse(localStorage.getItem('messages'));
            const roomsDiv = document.getElementById('roomsList');
            if (!roomsDiv) return;
            roomsDiv.innerHTML = rooms.map(room => {
                const unread = messages.filter(m => m.roomId == room.id && m.senderId !== 'admin' && !m.read).length;
                return `<div class="room-item" data-roomid="${room.id}"><i class="fas fa-user-circle"></i> ${room.buyerName} ${unread ? `<span class="badge">${unread}</span>` : ''}</div>`;
            }).join('');
            document.querySelectorAll('.room-item').forEach(el => {
                el.addEventListener('click', () => {
                    currentRoomId = parseInt(el.dataset.roomid);
                    document.querySelectorAll('.room-item').forEach(r => r.classList.remove('active'));
                    el.classList.add('active');
                    let msgs = JSON.parse(localStorage.getItem('messages'));
                    msgs = msgs.map(m => m.roomId == currentRoomId && m.senderId !== 'admin' ? { ...m, read: true } : m);
                    localStorage.setItem('messages', JSON.stringify(msgs));
                    loadMessages(currentRoomId);
                });
            });
        }

        function loadMessages(roomId) {
            const messages = JSON.parse(localStorage.getItem('messages'));
            const roomMessages = messages.filter(m => m.roomId == roomId).sort((a,b) => a.timestamp - b.timestamp);
            const container = document.getElementById('chatMessages');
            container.innerHTML = '';
            roomMessages.forEach(msg => {
                const isAdmin = msg.senderId === 'admin';
                const div = document.createElement('div');
                div.className = `message ${isAdmin ? 'admin' : 'buyer'}`;
                let content = '';
                if (msg.content) content += `<i class="fas ${isAdmin ? 'fa-user-shield' : 'fa-user'}"></i> ${msg.content}`;
                if (msg.fileUrl) content += `<br><a href="${msg.fileUrl}" target="_blank">📎 File</a>`;
                div.innerHTML = content;
                container.appendChild(div);
            });
            container.scrollTop = container.scrollHeight;
        }
    </script>
</body>
</html>
